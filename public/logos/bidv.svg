<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 60" width="160" height="60">
  <!-- BIDV teal text -->
  <text x="8" y="42" font-family="Arial Black, Arial" font-weight="900" font-size="36" fill="#007070" letter-spacing="2">BIDV</text>
  <!-- Yellow flower/star icon -->
  <g transform="translate(138,30)">
    <circle cx="0" cy="0" r="16" fill="#F5A800"/>
    <!-- 6-petal flower -->
    <ellipse cx="0" cy="-10" rx="5" ry="8" fill="white" transform="rotate(0)"/>
    <ellipse cx="0" cy="-10" rx="5" ry="8" fill="white" transform="rotate(60)"/>
    <ellipse cx="0" cy="-10" rx="5" ry="8" fill="white" transform="rotate(120)"/>
    <ellipse cx="0" cy="-10" rx="5" ry="8" fill="white" transform="rotate(180)"/>
    <ellipse cx="0" cy="-10" rx="5" ry="8" fill="white" transform="rotate(240)"/>
    <ellipse cx="0" cy="-10" rx="5" ry="8" fill="white" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="5" fill="#F5A800"/>
  </g>
</svg>
